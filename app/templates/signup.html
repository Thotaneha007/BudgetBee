{% extends "base.html" %}

{% block body %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="logo-area" style="justify-content: center; margin-bottom: 24px;">
            <div class="logo-icon">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5L90 28V72L50 95L10 72V28L50 5Z" fill="url(#hexGradient)" stroke="var(--primary-hover)" stroke-width="2"/>
                    <path d="M38 35H55C62 35 65 38 65 44C65 48 62 51 58 52C64 53 68 56 68 62C68 68 64 72 55 72H38V35ZM48 49H54C57 49 58 48 58 45C58 42 57 41 54 41H48V49ZM48 63H55C58 63 59 62 59 58C59 54 58 53 55 53H48V63Z" fill="white"/>
                    <defs>
                        <linearGradient id="hexGradient" x1="10" y1="5" x2="90" y2="95" gradientUnits="userSpaceOnUse">
                            <stop stop-color="var(--primary)"/>
                            <stop offset="1" stop-color="var(--primary-hover)"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="brand-text">Budget<span>Bee</span></div>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 8px;">Create Account</h2>
        <p style="text-align: center; margin-bottom: 32px;" data-i18n="auth.signup_desc">Start managing your expenses smartly</p>
        
        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div class="form-group">
                <label class="form-label" data-i18n="auth.username">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label class="form-label" data-i18n="auth.password">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Create a password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;" data-i18n="auth.signup_btn">Sign Up</button>
        </form>
        
        <p style="text-align: center; margin-top: 24px;">
            <span data-i18n="auth.has_account">Already have an account?</span> 
            <a href="{{ url_for('auth.login') }}" data-i18n="auth.login_link">Login</a>
        </p>
    </div>
</div>
{% endblock %}
